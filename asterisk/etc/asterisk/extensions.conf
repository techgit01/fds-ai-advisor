[default]
exten => _X.,1,Hangup()

; ── FDS AI가 iPhone으로 발신 → 수신 후 AGI 실행 ───────────────────────────────
[fds-outbound]
; AMI Originate 로 이 컨텍스트를 지정
; iPhone(Linphone)이 전화를 받으면 AGI 스크립트 실행
exten => s,1,NoOp(FDS 자동 발신 시작)
exten => s,n,Answer()
exten => s,n,Wait(1)
exten => s,n,AGI(fds_agi.py)
exten => s,n,Hangup()

; ── iPhone 에서 직접 걸어올 때 (테스트용) ───────────────────────────────────────
[fds-inbound]
exten => s,1,NoOp(FDS 인바운드 테스트)
exten => s,n,Answer()
exten => s,n,Wait(1)
exten => s,n,AGI(fds_agi.py)
exten => s,n,Hangup()

; 내선번호 101로 걸 때도 동일 처리
exten => 101,1,Goto(fds-inbound,s,1)
