[general]
context        = default
allowguest     = no
allowoverlap   = no
bindport       = 5060
bindaddr       = 0.0.0.0
tcpenable      = yes
tcpbindaddr    = 0.0.0.0
language       = ko
qualify        = yes
nat            = force_rport,comedia
directmedia    = no
videosupport   = no
dtmfmode       = rfc2833

; 코덱: G.711 ulaw/alaw (Asterisk 기본, 8kHz)
allow          = !all
allow          = ulaw
allow          = alaw

; ── iPhone Linphone 내선 ─────────────────────────────────────────────────────
[iphone]
type           = friend
host           = dynamic
secret         = fds1234!
context        = fds-inbound
callerid       = 고객 <101>
nat            = force_rport,comedia
qualify        = yes
