[general]
context        = default
allowguest     = no
allowoverlap   = no
bindport       = 5060
bindaddr       = 0.0.0.0
tcpenable      = yes
tcpbindaddr    = 0.0.0.0
language       = ko
qualify        = yes
nat            = force_rport,comedia
directmedia    = no
; Tailscale 가상망(CGNAT 100.64.0.0/10)을 로컬로 취급 → SDP에 Tailscale IP를
; 광고하여 RTP(음성)가 양방향으로 흐르게 함. (없으면 단방향 음성 발생 가능)
localnet       = 100.64.0.0/10
videosupport   = no
dtmfmode       = rfc2833

; 코덱: G.711 ulaw/alaw (Asterisk 기본, 8kHz)
allow          = !all
allow          = ulaw
allow          = alaw

; ── iPhone Linphone 내선 ─────────────────────────────────────────────────────
[iphone]
type           = friend
host           = dynamic
secret         = fds1234!
context        = fds-inbound
callerid       = 고객 <101>
nat            = force_rport,comedia
qualify        = yes
