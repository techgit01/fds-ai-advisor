[general]
context        = default
allowguest     = no
allowoverlap   = no
bindport       = 5060
bindaddr       = 0.0.0.0
tcpenable      = yes
tcpbindaddr    = 0.0.0.0
language       = ko
qualify        = yes
nat            = force_rport,comedia
directmedia    = no
; ── 미디어(RTP) 주소 ─────────────────────────────────────────────────────────
; 외부망(Tailscale/LTE) 폰과 연결 시, Asterisk가 SDP에 광고할 주소를 명시해야
; 음성이 흐른다. run.sh가 Tailscale 감지 시 아래에 externip/localnet 라인을
; 자동 주입한다 (asterisk/.runtime/sip.conf 생성). 같은 LAN은 별도 설정 불필요.
; 수동 설정 예) externip = 100.x.x.x   /   localnet = 172.16.0.0/12
videosupport   = no
dtmfmode       = rfc2833

; 코덱: G.711 ulaw/alaw (Asterisk 기본, 8kHz)
allow          = !all
allow          = ulaw
allow          = alaw

; ── iPhone Linphone 내선 ─────────────────────────────────────────────────────
[iphone]
type           = friend
host           = dynamic
secret         = fds1234!
context        = fds-inbound
callerid       = 고객 <101>
nat            = force_rport,comedia
qualify        = yes
