<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FDS AI 상담사 테스트</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3e;
    --accent: #4f6ef7;
    --accent2: #7c3aed;
    --text: #e2e8f0;
    --muted: #64748b;
    --high: #ef4444;
    --medium: #f97316;
    --low: #22c55e;
    --advisor: #4f6ef7;
    --customer: #7c3aed;
    --system: #475569;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  header .logo span { color: var(--accent); }
  header .badge {
    font-size: 11px;
    background: var(--border);
    color: var(--muted);
    padding: 3px 8px;
    border-radius: 20px;
  }

  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    flex: 1;
    height: calc(100vh - 57px);
    overflow: hidden;
  }

  /* ── 왼쪽 입력 패널 ── */
  .panel-left {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 4px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px;
    background: none;
    border: none;
    color: var(--muted);
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all .15s;
  }
  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }

  .tab-panel { display: none; flex-direction: column; gap: 14px; }
  .tab-panel.active { display: flex; }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .8px;
    text-transform: uppercase;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 13px; color: var(--muted); }

  input, select, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 14px;
    padding: 9px 12px;
    width: 100%;
    outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
  }

  .btn {
    padding: 11px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    width: 100%;
  }
  .btn-secondary {
    background: var(--accent2);
    color: #fff;
    width: 100%;
  }
  .btn-ghost {
    background: var(--border);
    color: var(--text);
    width: 100%;
  }

  /* ── 오른쪽 결과 패널 ── */
  .panel-right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .result-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  .result-header h2 { font-size: 15px; font-weight: 600; }

  .result-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* FDS 결과 카드 */
  .fds-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .fds-card-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .8px;
    margin-bottom: 14px;
  }
  .fds-risk {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .risk-badge {
    font-size: 14px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .risk-badge.high { background: rgba(239,68,68,.15); color: var(--high); border: 1px solid rgba(239,68,68,.3); }
  .risk-badge.medium { background: rgba(249,115,22,.15); color: var(--medium); border: 1px solid rgba(249,115,22,.3); }
  .risk-badge.low { background: rgba(34,197,94,.15); color: var(--low); border: 1px solid rgba(34,197,94,.3); }

  .score-bar-wrap { display: flex; align-items: center; gap: 10px; flex: 1; }
  .score-bar {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .5s ease;
  }
  .score-fill.high { background: var(--high); }
  .score-fill.medium { background: var(--medium); }
  .score-fill.low { background: var(--low); }
  .score-text { font-size: 13px; color: var(--muted); white-space: nowrap; }

  .signals {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .signal-tag {
    font-size: 12px;
    padding: 3px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
  }

  /* 대화 */
  .conversation { display: flex; flex-direction: column; gap: 10px; }
  .conv-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .8px;
    padding: 0 4px;
  }

  .msg {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .msg.advisor .msg-avatar { background: rgba(79,110,247,.2); color: var(--advisor); }
  .msg.customer .msg-avatar { background: rgba(124,58,237,.2); color: var(--customer); }
  .msg.system .msg-avatar { background: var(--border); color: var(--muted); }
  .msg.step .msg-avatar { background: transparent; color: var(--muted); font-size: 16px; }

  .msg-bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
  }
  .msg.advisor .msg-bubble {
    background: rgba(79,110,247,.1);
    border: 1px solid rgba(79,110,247,.2);
    border-top-left-radius: 3px;
  }
  .msg.customer .msg-bubble {
    background: rgba(124,58,237,.1);
    border: 1px solid rgba(124,58,237,.2);
    border-top-left-radius: 3px;
    margin-left: auto;
  }
  .msg.system .msg-bubble {
    background: var(--bg);
    border: 1px dashed var(--border);
    border-top-left-radius: 3px;
    font-family: monospace;
    font-size: 13px;
    color: var(--muted);
  }
  .msg.step .msg-bubble {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12px;
    padding: 2px 0;
  }
  .msg.step .msg-bubble::before { content: '──  '; }

  .msg-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .msg.customer { flex-direction: row-reverse; }
  .msg.customer .msg-label { text-align: right; }

  /* 최종 결과 */
  .final-card {
    border-radius: var(--radius);
    padding: 18px 20px;
    border: 2px solid;
    text-align: center;
  }
  .final-card.정상거래 { background: rgba(34,197,94,.08); border-color: rgba(34,197,94,.3); }
  .final-card.부정거래확정 { background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.3); }
  .final-card.거래확인불가 { background: rgba(249,115,22,.08); border-color: rgba(249,115,22,.3); }
  .final-card.통화실패 { background: rgba(100,116,139,.08); border-color: rgba(100,116,139,.3); }
  .final-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .final-value { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .final-card.정상거래 .final-value { color: var(--low); }
  .final-card.부정거래확정 .final-value { color: var(--high); }
  .final-card.거래확인불가 .final-value { color: var(--medium); }
  .final-card.통화실패 .final-value { color: var(--muted); }

  /* 로그 테이블 */
  .log-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .log-table th {
    text-align: left;
    padding: 8px 12px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .5px;
    border-bottom: 1px solid var(--border);
  }
  .log-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: rgba(255,255,255,.02); }

  /* 빈 상태 */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    padding: 60px 20px;
    text-align: center;
  }
  .empty-state .icon { font-size: 40px; opacity: .4; }
  .empty-state p { font-size: 14px; }

  /* 스피너 */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">FDS <span>AI</span> 상담사</div>
  <div class="badge">테스트 UI</div>
</header>

<div class="layout">

  <!-- ── 왼쪽 입력 패널 ── -->
  <div class="panel-left">

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('detect')">FDS 탐지</button>
      <button class="tab-btn" onclick="switchTab('simulate')">전체 시뮬레이션</button>
      <button class="tab-btn" onclick="switchTab('logs')">로그</button>
    </div>

    <!-- FDS 탐지 탭 -->
    <div id="tab-detect" class="tab-panel active">
      <p class="section-title">거래 정보</p>

      <div class="form-group">
        <label>거래처 (가맹점)</label>
        <input id="d-merchant" type="text" value="Amazon USA" placeholder="Amazon USA">
      </div>

      <div class="row2">
        <div class="form-group">
          <label>거래액 (원)</label>
          <input id="d-amount" type="number" value="2500000" min="0">
        </div>
        <div class="form-group">
          <label>평소 거래액 (원)</label>
          <input id="d-avg" type="number" value="500000" min="0">
        </div>
      </div>

      <div class="form-group">
        <label>거래 지역</label>
        <input id="d-location" type="text" value="뉴욕, 미국" placeholder="서울 강남">
      </div>

      <div class="form-group">
        <label>거래 시간</label>
        <input id="d-time" type="datetime-local" value="2024-06-15T03:45">
      </div>

      <div class="row2">
        <div class="form-group">
          <label>거래 유형</label>
          <select id="d-type">
            <option value="해외결제">해외결제</option>
            <option value="국내결제">국내결제</option>
            <option value="온라인결제">온라인결제</option>
          </select>
        </div>
        <div class="form-group">
          <label>해외 거래</label>
          <select id="d-abroad">
            <option value="true">예</option>
            <option value="false">아니오</option>
          </select>
        </div>
      </div>

      <button class="btn btn-primary" id="btn-detect" onclick="runDetect()">
        위험도 판정 실행
      </button>

      <p style="font-size:12px; color: var(--muted); margin-top: -6px;">
        NVIDIA API 키 없이 실행됩니다.
      </p>
    </div>

    <!-- 전체 시뮬레이션 탭 -->
    <div id="tab-simulate" class="tab-panel">
      <p class="section-title">API 설정</p>
      <div class="form-group">
        <label>NVIDIA API Key</label>
        <input id="s-apikey" type="password" placeholder="nvapi-..." value="">
        <span style="font-size:11px;color:var(--muted);margin-top:2px;">.env 파일 설정 시 비워두세요.</span>
      </div>

      <hr class="divider">
      <p class="section-title">고객 및 거래 정보</p>

      <div class="row2">
        <div class="form-group">
          <label>고객명</label>
          <input id="s-name" type="text" value="김철수">
        </div>
        <div class="form-group">
          <label>카드사</label>
          <input id="s-bank" type="text" value="카드사">
        </div>
      </div>

      <div class="form-group">
        <label>거래처</label>
        <input id="s-merchant" type="text" value="Amazon USA">
      </div>

      <div class="row2">
        <div class="form-group">
          <label>거래액 (원)</label>
          <input id="s-amount" type="number" value="150000" min="0">
        </div>
        <div class="form-group">
          <label>평소 거래액 (원)</label>
          <input id="s-avg" type="number" value="500000" min="0">
        </div>
      </div>

      <div class="form-group">
        <label>거래 지역</label>
        <input id="s-location" type="text" value="뉴욕, 미국">
      </div>

      <div class="row2">
        <div class="form-group">
          <label>거래 시간</label>
          <input id="s-time" type="datetime-local" value="2024-06-15T03:45">
        </div>
        <div class="form-group">
          <label>거래 유형</label>
          <select id="s-type">
            <option value="해외결제">해외결제</option>
            <option value="국내결제">국내결제</option>
          </select>
        </div>
      </div>

      <hr class="divider">
      <p class="section-title">고객 응답 시뮬레이션</p>

      <div class="form-group">
        <label>PHASE 1 — 본인확인 응답</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;">
          <button class="btn btn-ghost" style="width:auto;padding:5px 10px;font-size:12px;"
            onclick="setPreset('s-p1','네, 맞습니다.')">본인확인</button>
          <button class="btn btn-ghost" style="width:auto;padding:5px 10px;font-size:12px;"
            onclick="setPreset('s-p1','아니요, 아닌데요.')">통화실패</button>
        </div>
        <textarea id="s-p1" rows="2">네, 맞습니다.</textarea>
      </div>

      <div class="form-group">
        <label>PHASE 2 — 거래확인 응답</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;">
          <button class="btn btn-ghost" style="width:auto;padding:5px 10px;font-size:12px;"
            onclick="setPreset('s-p2','네, 제가 했습니다.')">정상거래</button>
          <button class="btn btn-ghost" style="width:auto;padding:5px 10px;font-size:12px;"
            onclick="setPreset('s-p2','아니요, 제가 안 했어요.')">부정거래</button>
          <button class="btn btn-ghost" style="width:auto;padding:5px 10px;font-size:12px;"
            onclick="setPreset('s-p2','잘 모르겠어요.')">불확실</button>
        </div>
        <textarea id="s-p2" rows="2">아니요, 제가 안 했어요.</textarea>
      </div>

      <button class="btn btn-secondary" id="btn-simulate" onclick="runSimulate()">
        시뮬레이션 실행
      </button>
    </div>

    <!-- 로그 탭 -->
    <div id="tab-logs" class="tab-panel">
      <button class="btn btn-ghost" onclick="loadLogs()">로그 불러오기</button>
      <div id="log-area"></div>
    </div>

  </div><!-- /panel-left -->

  <!-- ── 오른쪽 결과 패널 ── -->
  <div class="panel-right">
    <div class="result-header">
      <h2>결과</h2>
      <div id="result-status"></div>
    </div>
    <div class="result-body" id="result-body">
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>왼쪽에서 거래 정보를 입력하고<br>실행 버튼을 눌러주세요.</p>
      </div>
    </div>
  </div>

</div><!-- /layout -->

<script>
// ── 탭 전환 ──────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['detect','simulate','logs'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'logs') loadLogs();
}

function setPreset(id, val) {
  document.getElementById(id).value = val;
}

// ── 공통 유틸 ────────────────────────────────────────────────────────────────
function getDatetimeValue(id) {
  const v = document.getElementById(id).value;
  if (!v) return '';
  // datetime-local → "YYYY-MM-DD HH:MM"
  return v.replace('T', ' ');
}

function clearResult() {
  document.getElementById('result-body').innerHTML = '';
  document.getElementById('result-status').innerHTML = '';
}

function appendToResult(html) {
  document.getElementById('result-body').insertAdjacentHTML('beforeend', html);
  const rb = document.getElementById('result-body');
  rb.scrollTop = rb.scrollHeight;
}

function setStatus(html) {
  document.getElementById('result-status').innerHTML = html;
}

// ── FDS 탐지 ─────────────────────────────────────────────────────────────────
async function runDetect() {
  const btn = document.getElementById('btn-detect');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 판정 중...';
  clearResult();
  setStatus('<span class="spinner"></span>');

  const payload = {
    merchant: document.getElementById('d-merchant').value,
    amount: document.getElementById('d-amount').value,
    customer_avg_amount: document.getElementById('d-avg').value,
    location: document.getElementById('d-location').value,
    time: getDatetimeValue('d-time'),
    type: document.getElementById('d-type').value,
    is_abroad: document.getElementById('d-abroad').value === 'true',
  };

  try {
    const res = await fetch('/api/detect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.error) { appendToResult(`<p style="color:var(--high)">${data.error}</p>`); return; }
    renderFDSResult(data);
    setStatus('');
  } catch (e) {
    appendToResult(`<p style="color:var(--high)">오류: ${e.message}</p>`);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '위험도 판정 실행';
  }
}

function renderFDSResult(fds) {
  const level = fds.risk_level;
  const score = Math.round(fds.risk_score * 100);
  const signals = (fds.reasons || []).map(r =>
    `<span class="signal-tag">${r}</span>`
  ).join('');
  const recs = (fds.recommendations || []).map(r =>
    `<li style="font-size:13px;color:var(--muted);margin-left:16px;list-style:disc;">${r}</li>`
  ).join('');

  appendToResult(`
    <div class="fds-card">
      <div class="fds-card-title">FDS 위험도 분석</div>
      <div class="fds-risk">
        <span class="risk-badge ${level}">${level.toUpperCase()}</span>
        <div class="score-bar-wrap">
          <div class="score-bar">
            <div class="score-fill ${level}" style="width:${score}%"></div>
          </div>
          <span class="score-text">${fds.risk_score}</span>
        </div>
      </div>
      ${signals ? `<div class="signals">${signals}</div>` : '<p style="font-size:13px;color:var(--muted)">탐지된 신호 없음</p>'}
      ${recs ? `<ul style="margin-top:12px;">${recs}</ul>` : ''}
    </div>
  `);
}

// ── 전체 시뮬레이션 ──────────────────────────────────────────────────────────
function runSimulate() {
  const btn = document.getElementById('btn-simulate');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 시뮬레이션 중...';
  clearResult();
  setStatus('<span class="spinner"></span>');

  const payload = {
    nim_api_key: document.getElementById('s-apikey').value,
    customer_name: document.getElementById('s-name').value,
    bank_name: document.getElementById('s-bank').value,
    merchant: document.getElementById('s-merchant').value,
    amount: document.getElementById('s-amount').value,
    customer_avg_amount: document.getElementById('s-avg').value,
    location: document.getElementById('s-location').value,
    time: getDatetimeValue('s-time'),
    type: document.getElementById('s-type').value,
    is_abroad: document.getElementById('s-type').value === '해외결제',
    phase1_response: document.getElementById('s-p1').value,
    phase2_response: document.getElementById('s-p2').value,
  };

  // 대화 컨테이너
  appendToResult('<div class="conversation" id="conv-wrap"><div class="conv-title">대화 기록</div></div>');

  const convWrap = () => document.getElementById('conv-wrap');

  function addMsg(type, text) {
    const map = {
      advisor:  ['상담사', '🤖'],
      customer: ['고객',   '👤'],
      system:   ['시스템', '⚙'],
      step:     ['',       ''],
    };
    const [label, icon] = map[type] || ['', ''];
    const el = document.createElement('div');
    el.className = `msg ${type}`;
    el.innerHTML = `
      <div class="msg-avatar">${icon}</div>
      <div>
        ${label ? `<div class="msg-label">${label}</div>` : ''}
        <div class="msg-bubble">${text}</div>
      </div>
    `;
    convWrap().appendChild(el);
    document.getElementById('result-body').scrollTop = 9999;
  }

  fetch('/api/simulate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  }).then(res => {
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    function read() {
      reader.read().then(({ done, value }) => {
        if (done) {
          btn.disabled = false;
          btn.innerHTML = '시뮬레이션 실행';
          setStatus('');
          return;
        }
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop();
        parts.forEach(part => {
          const lines = part.split('\n');
          let eventType = 'message', data = '';
          lines.forEach(l => {
            if (l.startsWith('event: ')) eventType = l.slice(7).trim();
            if (l.startsWith('data: ')) data = l.slice(6);
          });
          handleSSE(eventType, data);
        });
        read();
      });
    }
    read();
  }).catch(e => {
    appendToResult(`<p style="color:var(--high)">연결 오류: ${e.message}</p>`);
    btn.disabled = false;
    btn.innerHTML = '시뮬레이션 실행';
    setStatus('');
  });

  function handleSSE(type, data) {
    switch (type) {
      case 'fds':
        try { renderFDSResult(JSON.parse(data)); } catch {}
        break;
      case 'step':
        addMsg('step', data);
        break;
      case 'advisor':
        addMsg('advisor', data);
        break;
      case 'customer':
        addMsg('customer', data);
        break;
      case 'result_phase1':
        addMsg('system', `PHASE 1 결과: <strong>${data}</strong>`);
        break;
      case 'result_phase2':
        addMsg('system', `PHASE 2 결과: <strong>${data}</strong>`);
        break;
      case 'final_result':
        appendToResult(`
          <div class="final-card ${data}">
            <div class="final-label">최종 판정</div>
            <div class="final-value">${data}</div>
          </div>
        `);
        document.getElementById('result-body').scrollTop = 9999;
        break;
      case 'error':
        appendToResult(`<p style="color:var(--high);font-size:14px;">오류: ${data}</p>`);
        btn.disabled = false;
        btn.innerHTML = '시뮬레이션 실행';
        setStatus('');
        break;
    }
  }
}

// ── 로그 ─────────────────────────────────────────────────────────────────────
async function loadLogs() {
  const area = document.getElementById('log-area');
  area.innerHTML = '<p style="color:var(--muted);font-size:13px;">불러오는 중...</p>';
  try {
    const res = await fetch('/api/logs');
    const logs = await res.json();
    if (!logs.length) {
      area.innerHTML = '<p style="color:var(--muted);font-size:13px;">저장된 로그가 없습니다.</p>';
      return;
    }
    const rows = logs.map(l => `
      <tr>
        <td>${l.timestamp ? l.timestamp.slice(0,16) : '-'}</td>
        <td>${l.customer_name || '-'}</td>
        <td>${l.fds_analysis?.risk_level?.toUpperCase() || '-'}</td>
        <td><span class="risk-badge ${l.result?.includes('부정') ? 'high' : l.result?.includes('정상') ? 'low' : 'medium'}"
          style="font-size:11px;">${l.result || '-'}</span></td>
      </tr>
    `).join('');
    area.innerHTML = `
      <table class="log-table" style="margin-top:10px;">
        <thead><tr>
          <th>시간</th><th>고객</th><th>위험도</th><th>결과</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch (e) {
    area.innerHTML = `<p style="color:var(--high);font-size:13px;">로드 실패: ${e.message}</p>`;
  }
}
</script>
