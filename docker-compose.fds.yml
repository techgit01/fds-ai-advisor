version: '3.8'

services:

  # ── FDS AI 상담사 (Flask) ──────────────────────────────────────────────────
  fds-ai-advisor:
    build:
      context: .
      dockerfile: Dockerfile.fds
    container_name: fds-ai-advisor
    # host 네트워크: asterisk(host)에서 127.0.0.1:5000으로 접근 가능
    network_mode: host
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - SUPERTONIC_LANGUAGE=ko
      - NIM_MODEL=${NIM_MODEL:-openai/gpt-oss-120b-instruct}
      - BANK_NAME=${BANK_NAME:-카드사}
      - FRAUD_RISK_THRESHOLD_HIGH=${FRAUD_RISK_THRESHOLD_HIGH:-0.6}
      - FRAUD_RISK_THRESHOLD_MEDIUM=${FRAUD_RISK_THRESHOLD_MEDIUM:-0.35}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - PORT=5000
      - FLASK_DEBUG=false
      - ASTERISK_HOST=${ASTERISK_HOST:-127.0.0.1}
      - ASTERISK_AMI_PORT=${ASTERISK_AMI_PORT:-5038}
      - ASTERISK_AMI_USER=${ASTERISK_AMI_USER:-fds}
      - ASTERISK_AMI_SECRET=${ASTERISK_AMI_SECRET:-fdsmanager123}
    volumes:
      - ./audio:/audio
      - ./logs:/app/logs
      - ./cache/whisper:/root/.cache/whisper
      - ./cache/huggingface:/root/.cache/huggingface
      - ./cache/supertonic:/root/.cache/supertonic
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/models/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Asterisk PBX ──────────────────────────────────────────────────────────
  asterisk:
    build:
      context: .
      dockerfile: Dockerfile.asterisk
    container_name: fds-asterisk
    network_mode: host          # SIP/RTP는 host 네트워크 필수
    volumes:
      - ./asterisk/etc/asterisk:/etc/asterisk:ro
      - ./src/fds_agi.py:/usr/share/asterisk/agi-bin/fds_agi.py
      - ./audio:/audio
    environment:
      - FDS_API_URL=http://127.0.0.1:5000
      - AUDIO_TMP=/audio/agi_tmp
      - BANK_NAME=${BANK_NAME:-카드사}
      - TTS_VOICE=${TTS_VOICE:-F1}
    restart: unless-stopped
    depends_on:
      - fds-ai-advisor
